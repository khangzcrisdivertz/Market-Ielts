    <script src="allreading.js"></script>

    <style>
    
.reading-list{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  width:90%;
  margin:40px auto;
}

/* CARD */

.reading-card{
  background:#2b2b2b;
  border-radius:14px;
  padding:20px;
  color:white;
  border:1px solid #3a3a3a;
  transition:all 0.25s ease;
  cursor:pointer;
}

.reading-card h3{
  margin:0;
  font-size:20px;
}

.reading-card p{
  margin-top:8px;
  font-size:14px;
  color:#bdbdbd;
}

/* HOVER EFFECT */

.reading-card:hover{
  transform:translateY(-3px);
  background:#303030;
  border:1px solid #4da3ff;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}


      body {
        margin: 0px;
      }
      .logo {
        font-size: 40px;
        color: white;
      }
      .main-nav {
        padding-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 17px;
      }
      .main-nav li {
        list-style: none;
      }
      .list-nav {
        display: flex;
        gap: 40px;
      }
      .main-nav a {
        font-size: 18px;
        display: block;
        text-decoration: none;
        color: rgb(255, 255, 255);
        transition: color 0.2s;
      }
      .list-nav a:hover { color: #a78bfa; }
      .list-nav a.active { color: #a78bfa; font-weight: 700; }
      .reading-header h4 { color: #fff; font-size: 22px; }
      .see-more-link { color: #a78bfa; text-decoration: none; font-size: 18px; transition: color 0.2s; }
      .see-more-link:hover { color: #c4b5fd; }

      .protest-strike-regular {
        font-family: "Protest Strike", sans-serif;
        font-weight: 300;
        font-style: normal;
      }

      .rubik-doodle-shadow-regular {
        font-family: "Rubik Doodle Shadow", system-ui;
        font-weight: 400;
        font-style: normal;
      }
