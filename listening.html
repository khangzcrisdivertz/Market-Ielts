<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IELTS Listening - IELTS Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="Style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Protest+Strike&family=Roboto:wght@400;700&family=Rubik+Doodle+Shadow&family=Knewave&display=swap" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
  </head>

  <body style="background-color: #212121">
   <nav class="container-nav main-nav">
      <div class="logo rubik-doodle-shadow-regular">Ielts Market</div>
      <div class="list-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="aboutus.html">About Us</a></li>
        <li><a href="grammar.html">Check Grammar with AI</a></li>
        <li><a href="#">Product to improve</a></li>
        <li><a href="login.html" id="login">Login</a></li>
      </div>
      <div class="input-container">
        <input
          placeholder="Search anything..."
          type="text"
          name="text"
          class="input"
          id="searchInput"
        />
      
        </ul>
      </div>
    </nav>
    <!-- PAGE HEADER -->
    <div class="reading-header protest-strike-regular">
      <h4 style="padding-left: 40px;">IELTS Listening – Improve by Levels</h4>
      <a href="#" class="see-more-link knewave-regular">View full tests</a>
    </div>

    <!-- CARD LIST -->
    <div class="container-card">
      <div class="listening-list" id="list-card-listening"></div>
    </div>

    <script src="alllistening.js"></script>

    <style>
      body { margin: 0; }

      .logo { font-size: 40px; color: white; }

      .main-nav {
        padding-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 17px;
      }
      .main-nav li { list-style: none; }

      .list-nav {
        display: flex;
        gap: 50px;
      }
      .main-nav a {
        font-size: 20px;
        display: block;
        text-decoration: none;
        color: rgb(255, 255, 255);
        transition: color 0.2s;
      }
      .main-nav a:hover  { color: #a78bfa; }
      .main-nav a.active { color: #a78bfa; font-weight: 700; }

      .protest-strike-regular {
        font-family: "Protest Strike", sans-serif;
        font-weight: 300;
        font-style: normal;
      }
      .rubik-doodle-shadow-regular {
        font-family: "Rubik Doodle Shadow", system-ui;
        font-weight: 400;
        font-style: normal;
      }
      .knewave-regular {
        font-family: "Knewave", system-ui;
        font-weight: 400;
        font-style: normal;
      }

      /* Header row */
      .reading-header {
        padding-top: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-right: 40px;
      }
      .reading-header h4 {
        color: #fff;
        font-size: 22px;
      }
      .see-more-link {
        color: #a78bfa;
        text-decoration: none;
        font-size: 18px;
        transition: color 0.2s;
      }
      .see-more-link:hover { color: #c4b5fd; }

      /* Grid layout */
      .container-card { display: flex; padding: 0 20px; }

      .listening-list {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
        width: 90%;
        margin: 30px auto;
      }

      /* Card */
      .listening-card {
        background: #2b2b2b;
        border-radius: 14px;
        overflow: hidden;
        color: white;
        border: 1px solid #3a3a3a;
        transition: all 0.25s ease;
        cursor: pointer;
      }
      .listening-card:hover {
        transform: translateY(-3px);
        background: #303030;
        border: 1px solid #a78bfa;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      }

      /* Thumbnail */
      .listening-card__thumb {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
        background: #111;
      }

      /* Card body */
      .listening-card__body {
        padding: 16px;
      }
      .listening-card__title {
        margin: 0 0 8px;
        font-size: 16px;
        font-family: "Protest Strike", sans-serif;
        font-weight: 300;
        line-height: 1.35;
        color: #fff;
      }
      .listening-card__level {
        margin: 0 0 12px;
        font-size: 13px;
        color: #aaa;
        font-family: "Protest Strike", sans-serif;
        font-weight: 300;
      }
      .listening-card__level span { color: #a78bfa; font-weight: 700; }

      .listening-card__btn {
        display: inline-block;
        padding: 7px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: box-shadow 0.2s, transform 0.2s;
        box-shadow: 0 4px 12px rgba(79,70,229,0.4);
      }
      .listening-card__btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(79,70,229,0.6);
      }
    </style>
  </body>
</html>
